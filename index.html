<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch B2 – Freizeitgestaltung</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Roboto',sans-serif;
    background:#1976d2;
    color:white;
    margin:0;
    padding:30px;
    text-align:center;
}

h1{
    margin-bottom:10px;
}

.exercise{
    background:rgba(255,255,255,0.12);
    padding:20px;
    border-radius:12px;
    margin:20px auto;
    max-width:750px;
}

.words{
    margin:15px 0;
}

.word{
    display:inline-block;
    background:white;
    color:#1976d2;
    padding:8px 14px;
    margin:6px;
    border-radius:6px;
    cursor:pointer;
    font-weight:500;
}

.word:hover{
    background:#e3f2fd;
}

.answer{
    min-height:40px;
    margin-top:10px;
    padding:10px;
    border-bottom:2px dashed white;
}

button{
    margin-top:12px;
    padding:8px 18px;
    border:none;
    border-radius:6px;
    background:white;
    color:#1976d2;
    font-weight:bold;
    cursor:pointer;
}

.correct{
    color:#b9ffcb;
    font-weight:bold;
}

.wrong{
    color:#ffb3b3;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>Freizeitgestaltung – Satzordnung (B2)</h1>
<p>Klicke die Wörter an und bilde einen korrekten Satz.</p>

<div id="exercises"></div>

<script>

const exercises = [

{
words:["Viele","Menschen","nutzen","ihre","Freizeit","um","neue","Hobbys","auszuprobieren"],
answer:"Viele Menschen nutzen ihre Freizeit um neue Hobbys auszuprobieren"
},

{
words:["Am","Wochenende","gehe","ich","oft","wandern","weil","ich","die","Natur","genieße"],
answer:"Am Wochenende gehe ich oft wandern weil ich die Natur genieße"
},

{
words:["In","meiner","Freizeit","lese","ich","gern","Romane","die","zum","Nachdenken","anregen"],
answer:"In meiner Freizeit lese ich gern Romane die zum Nachdenken anregen"
},

{
words:["Viele","Leute","treiben","Sport","um","Stress","nach","der","Arbeit","abzubauen"],
answer:"Viele Leute treiben Sport um Stress nach der Arbeit abzubauen"
},

{
words:["Wenn","ich","Zeit","habe","treffe","ich","mich","mit","Freunden","im","Café"],
answer:"Wenn ich Zeit habe treffe ich mich mit Freunden im Café"
},

{
words:["Manche","Menschen","bevorzugen","ruhige","Aktivitäten","wie","Lesen","oder","Musik","hören"],
answer:"Manche Menschen bevorzugen ruhige Aktivitäten wie Lesen oder Musik hören"
}

];

const container=document.getElementById("exercises");

exercises.forEach((ex,i)=>{

let div=document.createElement("div");
div.className="exercise";

let words=[...ex.words].sort(()=>Math.random()-0.5);

div.innerHTML=`
<h3>Aufgabe ${i+1}</h3>
<div class="words" id="words${i}"></div>
<div class="answer" id="answer${i}"></div>
<button onclick="check(${i})">Prüfen</button>
<p id="result${i}"></p>
`;

container.appendChild(div);

let wordContainer=document.getElementById("words"+i);

words.forEach(w=>{
let span=document.createElement("span");
span.className="word";
span.textContent=w;

span.onclick=()=>{
document.getElementById("answer"+i).innerHTML+=w+" ";
span.style.display="none";
};

wordContainer.appendChild(span);
});

});

function check(i){

let user=document.getElementById("answer"+i).innerText.trim().toLowerCase();
let correct=exercises[i].answer.toLowerCase();

let result=document.getElementById("result"+i);

if(user===correct){
result.textContent="Richtig!";
result.className="correct";
}else{
result.textContent="Nicht ganz richtig. Versuche es noch einmal.";
result.className="wrong";
}

}

</script>

</body>
</html>
